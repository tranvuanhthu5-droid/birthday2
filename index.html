<!DOCTYPE html>
<html lang="vi">
<head>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1e293b,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:1;
animation:fadeIn 2s ease;
}

h1{
display:flex;
align-items:center;
justify-content:center;

flex-wrap:wrap;
font-size:clamp(42px, 8vw, 80px);
text-align:center;
}

.cake{
font-size:clamp(36px,6vw,70px);
margin-right:15px;
vertical-align:middle;
}

.title{
font-size:clamp(42px,8vw,80px);
color:white;

text-shadow:
0 3px 0 #000,
0 0 10px rgba(255,255,255,0.9),
0 0 25px rgba(250,204,21,0.9),
0 0 50px rgba(250,204,21,0.6),
0 0 15px rgba(255,215,0,0.9),
0 0 35px rgba(255,215,0,0.6);
}

.subtitle{
font-family:'Dancing Script', cursive;
background:linear-gradient(#fff7cc,#facc15,#fff7cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-size:50px;
margin-top:16px;
line-height:1.3;
word-spacing:5px;

color:#fde68a;

text-shadow:
0 3px 8px rgba(0,0,0,0.7),
0 0 12px rgba(255,215,0,0.6),
0 0 20px rgba(255,215,0,0.35);

max-width:90%;
margin-left:auto;
margin-right:auto;
padding:0 10px;
}

button{
margin-top:40px;
padding:18px 45px;
font-size:20px;
border:none;
border-radius:15px;
background:#facc15;
cursor:pointer;
font-weight:bold;
transition:0.3s;
box-shadow:0 10px 30px rgba(250,204,21,.3);
}

button:hover{
transform:scale(1.1);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@media (max-width:600px){

.title{
font-size:42px;
letter-spacing:1px;
}

.cake{
font-size:40px;
margin-right:8px;
}

h1{
flex-wrap:wrap;
}

.subtitle{
font-size:34px;
line-height:1.35;
max-width:92%;
word-spacing:3px;
}

button{
font-size:20px;
padding:18px 34px;
}

}
  
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="container">

<h1>
<span class="cake">🎂</span>
<span class="title"> Happy Birthday </span>
<span class="cake">🎂</span>
</h1>

<p class="subtitle">
Chúc mừng sinh nhật Ba
</p>

<button class="button-link" onclick="openLetter()">
Bấm vô đây nè
</button>

</div>

<script>

function playMusic(){

const music = document.getElementById("music");

music.currentTime = 100;
music.play();

setTimeout(()=>{
music.pause();
},50000);

}

/* chuyển trang */

function openLetter(){

const music = document.getElementById("music");

music.currentTime = 100;

music.play().then(()=>{

setTimeout(()=>{
window.location.href="chucmung.html";
},1500);

}).catch(err=>{
console.log("audio blocked",err);
window.location.href="chucmung.html";
});

}

}

/* pháo hoa */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function firework(){

if(particles.length > 300) return;
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<60;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:80,
size:Math.random()*3+1
});

}

}

function animate(){

requestAnimationFrame(animate);

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.globalAlpha = p.life / 80;

ctx.beginPath();
ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
ctx.fill();

ctx.globalAlpha = 1;

if(p.life<=0)particles.splice(i,1);

});

}

let fireworkInterval = setInterval(firework,1500);

document.addEventListener("visibilitychange", () => {

if(document.hidden){
clearInterval(fireworkInterval);
}
else{
fireworkInterval = setInterval(firework,1500);
}

});
  
animate();

</script>
<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>
</body>
</html>
